<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFT-X Quant Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="quantEngine.js"></script>

<style>
body {
  background: #0f172a;
}
.card {
  background: #111827;
  border: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body class="text-gray-200 p-6">

<h1 class="text-3xl font-semibold mb-6 tracking-tight">
PFT-X Quant Intelligence
</h1>

<!-- INPUT -->
<div class="flex gap-2 mb-6">
  <input id="symbolInput" placeholder="Symbol (NVDA)"
    class="px-3 py-2 text-black rounded">
  <input id="sharesInput" type="number" placeholder="Shares"
    class="px-3 py-2 text-black rounded w-24">
  <button onclick="QuantEngine.addAsset()"
    class="bg-blue-600 px-4 py-2 rounded">
    Add
  </button>
</div>

<!-- METRICS -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">

  <div class="card p-4 rounded">
    <p>Total Value</p>
    <h2 id="totalValue" class="text-2xl font-semibold">£0</h2>
  </div>

  <div class="card p-4 rounded">
    <p>Volatility</p>
    <h2 id="volatility" class="text-2xl font-semibold">0%</h2>
  </div>

  <div class="card p-4 rounded">
    <p>Sharpe</p>
    <h2 id="sharpe" class="text-2xl font-semibold">0</h2>
  </div>

  <div class="card p-4 rounded">
    <p>Max Drawdown</p>
    <h2 id="drawdown" class="text-2xl font-semibold">0%</h2>
  </div>

</div>

<!-- CHARTS -->
<div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

  <div class="card p-6 rounded">
    <h3 class="mb-4">Performance</h3>
    <canvas id="performanceChart"></canvas>
  </div>

  <div class="card p-6 rounded">
    <h3 class="mb-4">Efficient Frontier</h3>
    <canvas id="frontierChart"></canvas>
  </div>

</div>

</body>
</html>
