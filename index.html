<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PFT-X</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>

<style>

body{
background: radial-gradient(circle at top left,#0b1220,#0f172a);
}

.card-glow{
background: rgba(30,41,59,.85);
backdrop-filter: blur(6px);
box-shadow:0 0 25px rgba(59,130,246,.15);
}

</style>
</head>

<body class="text-white min-h-screen p-8">

<h1 class="text-3xl font-bold mb-6">PFT-X</h1>

<!-- INPUT -->
<div class="flex space-x-2 mb-6">
<input id="portfolioSymbol" placeholder="Symbol (NVDA)" class="px-3 py-2 rounded text-black">
<input id="portfolioShares" type="number" placeholder="Shares" class="px-3 py-2 rounded text-black w-24">
<button onclick="addToPortfolio()" class="bg-green-600 px-4 py-2 rounded">Add</button>
</div>

<!-- DASHBOARD CARDS -->
<div class="grid grid-cols-1 md:grid-cols-6 gap-6 mb-6">

<div class="card-glow p-6 rounded">
<p>Total Portfolio Value</p>
<h2 id="totalValue" class="text-3xl font-bold">£0.00</h2>
</div>

<div class="card-glow p-6 rounded">
<p>Profit / Loss</p>
<h2 id="profitValue" class="text-3xl font-bold">£0.00</h2>
</div>

<div class="card-glow p-6 rounded">
<p>Risk Score</p>
<h2 id="riskScore" class="text-3xl font-bold">0</h2>
</div>

<div class="card-glow p-6 rounded">
<p>Volatility %</p>
<h2 id="volatilityValue" class="text-3xl font-bold">0%</h2>
</div>

<div class="card-glow p-6 rounded">
<p>Total Positions</p>
<h2 id="positionCount" class="text-3xl font-bold">0</h2>
</div>

<div class="card-glow p-6 rounded">
<p>Last Updated</p>
<h2 id="lastUpdated" class="text-xl font-bold">-</h2>
</div>

</div>

<!-- CANDLE CHART -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-2 font-semibold">3 Year Price History</h3>
<canvas id="candleChart" height="120"></canvas>
</div>

<!-- PERFORMANCE -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-2 font-semibold">Portfolio Performance</h3>
<canvas id="performanceChart"></canvas>
</div>

<!-- MONTE CARLO -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-2 font-semibold">Monte Carlo Simulation</h3>
<canvas id="monteChart"></canvas>
</div>

<!-- AI INSIGHTS -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-4 font-semibold">AI Insights</h3>
<div id="aiInsights"></div>
</div>

<!-- NEWS -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-4 font-semibold">Market News</h3>
<div id="newsContainer"></div>
</div>

<!-- MARKET DRIVERS -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-4 font-semibold">Market Drivers</h3>
<div id="marketDrivers"></div>
</div>

<!-- PRICE EVENTS -->
<div class="card-glow p-6 rounded mb-6">
<h3 class="mb-4 font-semibold">Price Events</h3>
<div id="priceEvents"></div>
</div>

<!-- PIE -->
<div class="card-glow p-6 rounded">
<h3 class="mb-4 font-semibold">Portfolio Allocation</h3>
<canvas id="pieChart"></canvas>
</div>

<script>

/* GLOBAL DATA */

let portfolio=[]
let portfolioHistory=[]
let newsCache=[]

/* COMPANY NAME MAP */

const companyNames={
NVDA:"NVIDIA",
AAPL:"Apple",
MSFT:"Microsoft",
TSLA:"Tesla",
AMZN:"Amazon",
GOOGL:"Alphabet",
META:"Meta",
AMD:"AMD"
}

function company(symbol){
return companyNames[symbol]||symbol
}

/* CHARTS */

const pieChart=new Chart(document.getElementById("pieChart"),{
type:"doughnut",
data:{labels:[],datasets:[{data:[],backgroundColor:["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6"]}]}
})

const performanceChart=new Chart(document.getElementById("performanceChart"),{
type:"line",
data:{labels:[],datasets:[{data:[],borderColor:"#3b82f6",tension:.4}]},
options:{plugins:{legend:{display:false}}}
})

const monteChart=new Chart(document.getElementById("monteChart"),{
type:"line",
data:{labels:[],datasets:[]},
options:{plugins:{legend:{display:false}}}
})

const candleChart=new Chart(document.getElementById("candleChart"),{
type:"candlestick",
data:{
datasets:[
{label:"Price",data:[]},
{type:"scatter",label:"Events",data:[],backgroundColor:"#f59e0b",pointRadius:6}
]
}
})

/* ADD STOCK */

async function addToPortfolio(){

const symbol=document.getElementById("portfolioSymbol").value.toUpperCase()
const shares=Number(document.getElementById("portfolioShares").value)

if(!symbol||!shares)return

portfolio.push({symbol,shares})

document.getElementById("portfolioSymbol").value=""
document.getElementById("portfolioShares").value=""

await refreshPortfolio()

}

/* REFRESH */

async function refreshPortfolio(){

let total=0
let totalPrevious=0

for(let item of portfolio){

const res=await fetch(`/api/stock?symbol=${item.symbol}`)
const data=await res.json()

if(data.current){

item.currentPrice=data.current
item.previousClose=data.previousClose

total+=item.shares*item.currentPrice
totalPrevious+=item.shares*item.previousClose

}

if(data.history){

candleChart.data.datasets[0].data=data.history.map(d=>({
x:new Date(d.t),
o:d.o,
h:d.h,
l:d.l,
c:d.c
}))

const events=findTurningPoints(data.history)

candleChart.data.datasets[1].data=events.map(e=>({
x:new Date(e.date),
y:e.price
}))

candleChart.update()

showEvents(events)

}

}

/* CALCULATIONS */

const profit=total-totalPrevious
const percent=totalPrevious?(profit/totalPrevious)*100:0
const volatility=Math.abs(percent)
const riskScore=Math.min(100,Math.round(volatility*5))

portfolioHistory.push(total)
if(portfolioHistory.length>30)portfolioHistory.shift()

/* UPDATE UI */

document.getElementById("totalValue").innerText="£"+total.toFixed(2)

document.getElementById("profitValue").innerText=
(profit>=0?"+":"")+"£"+profit.toFixed(2)+" ("+percent.toFixed(2)+"%)"

document.getElementById("volatilityValue").innerText=volatility.toFixed(2)+"%"
document.getElementById("riskScore").innerText=riskScore
document.getElementById("positionCount").innerText=portfolio.length
document.getElementById("lastUpdated").innerText=new Date().toLocaleTimeString()

updateCharts(total,volatility)
generateInsights(percent,volatility)
generateMarketDrivers()

}

/* CHART UPDATES */

function updateCharts(total,vol){

performanceChart.data.labels=portfolioHistory.map((_,i)=>i)
performanceChart.data.datasets[0].data=portfolioHistory
performanceChart.update()

pieChart.data.labels=portfolio.map(p=>company(p.symbol))
pieChart.data.datasets[0].data=portfolio.map(p=>p.shares*p.currentPrice)
pieChart.update()

runMonteCarlo(total,vol)

}

/* MONTE CARLO */

function runMonteCarlo(value,vol){

const days=30
const sims=30
const datasets=[]

for(let s=0;s<sims;s++){

let prices=[value]

for(let d=1;d<=days;d++){

const shock=(Math.random()-.5)*2*(vol/100)
prices.push(prices[d-1]*(1+shock))

}

datasets.push({
data:prices,
borderColor:"rgba(59,130,246,.15)",
borderWidth:1,
tension:.3
})

}

monteChart.data.labels=Array.from({length:days+1},(_,i)=>i)
monteChart.data.datasets=datasets
monteChart.update()

}

/* PEAK DETECTION */

function findTurningPoints(history){

const events=[]

for(let i=2;i<history.length-2;i++){

const prev=history[i-1].c
const curr=history[i].c
const next=history[i+1].c

if(curr>prev&&curr>next)
events.push({type:"peak",price:curr,date:history[i].t})

if(curr<prev&&curr<next)
events.push({type:"low",price:curr,date:history[i].t})

}

return events

}

function showEvents(events){

const container=document.getElementById("priceEvents")
container.innerHTML=""

events.slice(-5).forEach(e=>{

container.innerHTML+=`
<div class="bg-slate-700 p-2 rounded mb-2">
${e.type==="peak"?"Price Peak":"Price Low"} detected on ${new Date(e.date).toLocaleDateString()}
</div>
`

})

}

/* AI INSIGHTS */

function generateInsights(percent,volatility){

const container=document.getElementById("aiInsights")
container.innerHTML=""

if(volatility>5)
container.innerHTML+=`<div class="bg-red-500/20 p-2 rounded mb-2">High volatility detected</div>`

if(percent>5)
container.innerHTML+=`<div class="bg-green-500/20 p-2 rounded mb-2">Strong gains detected</div>`

if(percent<-5)
container.innerHTML+=`<div class="bg-yellow-500/20 p-2 rounded mb-2">Drawdown detected</div>`

}

/* MARKET DRIVERS */

function generateMarketDrivers(){

const container=document.getElementById("marketDrivers")
container.innerHTML=""

portfolio.forEach(stock=>{

if(!stock.previousClose||!stock.currentPrice)return

const move=((stock.currentPrice-stock.previousClose)/stock.previousClose)*100

container.innerHTML+=`
<div class="bg-slate-700 p-2 rounded mb-2">
<b>${company(stock.symbol)}</b> ${move>=0?"↑":"↓"} ${move.toFixed(2)}%
</div>
`

})

}

/* NEWS */

async function loadNews(){

const res=await fetch("/api/news")
const news=await res.json()

newsCache=news

const container=document.getElementById("newsContainer")
container.innerHTML=""

news.forEach(item=>{

container.innerHTML+=`
<div class="bg-slate-700 p-2 rounded mb-2">
<a href="${item.url}" target="_blank">${item.headline}</a>
</div>
`

})

}

loadNews()
refreshPortfolio()
setInterval(refreshPortfolio,15000)

</script>

</body>
</html>
