<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PFT-X | Personal Financial Terminal</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0a0f1c;
color:white;
font-family:Arial;
}

.card{
background:#111827;
padding:20px;
border-radius:12px;
}

</style>

</head>

<body class="p-6">

<h1 class="text-3xl font-bold mb-6">PFT-X Financial Terminal</h1>

<div id="lastUpdated" class="text-xs text-gray-400 absolute top-6 right-6">
Last updated: --
</div>

<!-- Portfolio Input -->

<div class="card mb-6">

<h2 class="text-xl mb-3">Add Stock</h2>

<input id="ticker" placeholder="Ticker" class="text-black p-2 mr-2">
<input id="shares" placeholder="Shares" type="number" class="text-black p-2 mr-2">
<input id="buyPrice" placeholder="Buy Price" type="number" class="text-black p-2 mr-2">

<button onclick="addStock()" class="bg-blue-600 px-4 py-2 rounded">
Add
</button>

</div>


<!-- Portfolio Stats -->

<div class="grid grid-cols-3 gap-4 mb-6">

<div class="card">
<h3>Portfolio Value</h3>
<p id="portfolioValue">£0</p>
</div>

<div class="card">
<h3>Total Profit</h3>
<p id="portfolioProfit">£0</p>
</div>

<div class="card">
<h3>AI Score</h3>
<p id="aiScore">0</p>
</div>

</div>


<!-- Charts -->

<div class="grid grid-cols-2 gap-6 mb-6">

<div class="card">
<h2>Portfolio Allocation</h2>
<canvas id="allocationChart"></canvas>
</div>

<div class="card">
<h2>Monte Carlo Simulation</h2>
<canvas id="monteChart"></canvas>
</div>

</div>


<!-- Wall Street Heatmap -->

<div class="card mb-6">

<h2 class="text-xl mb-3">Market Heatmap</h2>

<div id="heatmap" class="grid grid-cols-6 gap-2"></div>

</div>


<!-- Hedge Fund Tracker -->

<div class="card">

<h2 class="text-xl mb-3">Hedge Fund Tracker</h2>

<table class="w-full">

<thead>
<tr>
<th>Fund</th>
<th>Stock</th>
<th>Position</th>
</tr>
</thead>

<tbody id="hedgeTable"></tbody>

</table>

</div>

<script src="portfolio.js"></script>
<script src="charts.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
