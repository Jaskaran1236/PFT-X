<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PFT-X</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: radial-gradient(circle at top left, #0b1220, #0f172a);
}
.card-glow {
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  box-shadow: 0 0 25px rgba(59,130,246,0.15);
}
</style>
</head>

<body class="text-white min-h-screen p-8">

<h1 class="text-3xl font-bold mb-6">PFT-X</h1>

<!-- INPUT -->
<div class="flex space-x-2 mb-6">
  <input id="portfolioSymbol" placeholder="Symbol (e.g. NVDA)" class="px-3 py-2 rounded text-black">
  <input id="portfolioShares" type="number" placeholder="Shares" class="px-3 py-2 rounded text-black w-24">
  <button onclick="addToPortfolio()" class="bg-green-600 px-4 py-2 rounded">Add</button>
</div>

<!-- CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-5 gap-6 mb-6">
  <div class="card-glow p-6 rounded">
    <p>Total Portfolio Value</p>
    <h2 id="totalValue" class="text-3xl font-bold">£0.00</h2>
  </div>
<div class="card-glow p-6 rounded">
  <p>Profit / Loss</p>
  <h2 id="profitValue" class="text-3xl font-bold">£0.00</h2>
</div>
    <div class="card-glow p-6 rounded">
  <p>Risk Score</p>
  <h2 id="riskScore" class="text-3xl font-bold">0</h2>
</div>

<div class="card-glow p-6 rounded">
  <p>Volatility %</p>
  <h2 id="volatilityValue" class="text-3xl font-bold">0%</h2>
</div>
  <div class="card-glow p-6 rounded">
    <p>Total Positions</p>
    <h2 id="positionCount" class="text-3xl font-bold">0</h2>
  </div>

  <div class="card-glow p-6 rounded">
    <p>Last Updated</p>
    <h2 id="lastUpdated" class="text-xl font-bold">-</h2>
  </div>
</div>
<!-- MINI LIVE CHART -->
<div class="card-glow p-6 rounded mb-6">
  <h3 class="mb-2 font-semibold">Live Price Trend</h3>
  <canvas id="miniChart" height="80"></canvas>
</div>

<!-- CHART -->
<div class="card-glow p-6 rounded">
  <h3 class="mb-4 font-semibold">Portfolio Allocation</h3>
  <canvas id="pieChart"></canvas>
</div>

<script>
let portfolio = [];
let pieChartInstance = null;
/* 🔥 MINI CHART STARTS HERE */
let miniChartInstance = null;

function initMiniChart() {
  const ctx = document.getElementById("miniChart");

  miniChartInstance = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: "#3b82f6",
        tension: 0.4,
        fill: false
      }]
    },
    options: {
      plugins: { legend: { display: false }},
      scales: {
        x: { display: false },
        y: { display: false }
      }
    }
  });
}

initMiniChart();
/* 🔥 MINI CHART ENDS HERE */
/* -------- CHART INIT -------- */
pieChartInstance = new Chart(document.getElementById('pieChart'), {
  type: 'doughnut',
  data: {
    labels: [],
    datasets: [{
      data: [],
      backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6']
    }]
  }
});

/* -------- ADD STOCK -------- */
async function addToPortfolio() {
  const symbol = document.getElementById("portfolioSymbol").value.toUpperCase();
  const shares = Number(document.getElementById("portfolioShares").value);

  if (!symbol || !shares) {
    alert("Enter symbol and shares");
    return;
  }

  portfolio.push({
    symbol,
    shares,
    currentPrice: 0
  });

  document.getElementById("portfolioSymbol").value = "";
  document.getElementById("portfolioShares").value = "";

  await refreshPortfolio();
}

/* -------- REFRESH PORTFOLIO -------- */
async function refreshPortfolio() {
  let total = 0;
  let totalPrevious = 0;

  for (let item of portfolio) {
    try {
      const response = await fetch(`/api/stock?symbol=${item.symbol}`);
      const data = await response.json();

      if (!data.error && data.current) {
        if (!item.history) item.history = [];
item.history.push(Number(data.current));

if (item.history.length > 20) {
  item.history.shift();
}
        item.currentPrice = Number(data.current);
        item.previousClose = Number(data.previousClose);

        total += item.shares * item.currentPrice;
        totalPrevious += item.shares * item.previousClose;
      }

    } catch (err) {
      console.log("API error:", err);
    }
  }

  // Total Value
  document.getElementById("totalValue").innerText =
    "£" + total.toFixed(2);

  // Profit / Loss
  const profit = total - totalPrevious;
  const percent = totalPrevious
    ? ((profit / totalPrevious) * 100)
    : 0;
  // Volatility approximation
const volatility = Math.abs(percent);

// Risk score scaling (0–100)
const riskScore = Math.min(100, Math.round(volatility * 5));

document.getElementById("volatilityValue").innerText =
  volatility.toFixed(2) + "%";

document.getElementById("riskScore").innerText =
  riskScore;

  const profitElement = document.getElementById("profitValue");

  profitElement.innerText =
    (profit >= 0 ? "+" : "") +
    "£" + profit.toFixed(2) +
    " (" + percent.toFixed(2) + "%)";

  profitElement.className =
    profit >= 0
      ? "text-green-400 text-3xl font-bold"
      : "text-red-400 text-3xl font-bold";

  document.getElementById("positionCount").innerText =
    portfolio.length;

  document.getElementById("lastUpdated").innerText =
    new Date().toLocaleTimeString();

  updatePieChart();
}

/* -------- UPDATE CHART -------- */
function updatePieChart() {
  const labels = portfolio.map(item => item.symbol);
  const data = portfolio.map(item => item.shares * item.currentPrice);

  pieChartInstance.data.labels = labels;
  pieChartInstance.data.datasets[0].data = data;
  pieChartInstance.update();
}

/* -------- AUTO REFRESH -------- */
  refreshPortfolio();
setInterval(refreshPortfolio, 15000);

</script>

</body>
</html>
